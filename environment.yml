name: gt-adf
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.9
  - pip
  - numpy>=1.24
  - pandas>=2.0
  - scikit-learn>=1.3
  - scipy>=1.11
  - matplotlib>=3.7
  - seaborn>=0.12
  - pyyaml>=6.0
  - tqdm>=4.65
  - networkx>=3.1
  - jupyterlab>=4.0
  - pytest>=7.4
  - pytest-cov

  # PyTorch — choose ONE block below, comment out the other
  # ── GPU (CUDA 11.8) ──────────────────────────────────────
  - pytorch>=2.0
  - torchvision
  - pytorch-cuda=11.8
  # ── CPU only (uncomment if no GPU) ───────────────────────
  # - pytorch>=2.0
  # - cpuonly

  - pip:
    # PyTorch Geometric — installed via pip after torch
    # The correct wheel URL depends on your torch+CUDA version.
    # See: https://pytorch-geometric.readthedocs.io/en/latest/install/installation.html
    - torch-geometric>=2.3
    - tensorboard>=2.13
    - captum>=0.6
    - plotly>=5.15
    - h5py>=3.9
