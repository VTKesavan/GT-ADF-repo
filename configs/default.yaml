# GT-ADF Default Configuration
# Override per-dataset with configs/cicids2017.yaml etc.

# ── Dataset ──────────────────────────────────────────────────────────
dataset: cicids2017           # cicids2017 | unsw_nb15 | ton_iot
data_dir: data/raw/CICIDS2017
binary: false                 # true = binary classification (normal vs attack)
num_classes: 15               # number of output classes (CICIDS2017)

# ── Model ─────────────────────────────────────────────────────────────
hidden_dim: 128               # node embedding dimension
num_layers: 4                 # Graph Transformer encoder layers
num_heads: 8                  # attention heads per layer
dropout: 0.2                  # dropout rate

# ── Semi-supervised ───────────────────────────────────────────────────
labeled_ratio: 0.20           # fraction of training nodes treated as labeled
lambda_unsup: 0.5             # weight for unsupervised consistency loss

# ── Graph Construction ────────────────────────────────────────────────
k_neighbors: 5                # k-NN graph construction
batch_window: 10              # flow records per graph
edge_method: knn              # knn | sequential

# ── Training ──────────────────────────────────────────────────────────
lr: 0.001
weight_decay: 1.0e-5
batch_size: 64
max_epochs: 100
patience: 10                  # early stopping patience

# ── Anomaly Thresholds ────────────────────────────────────────────────
threshold_t1: 30              # below T1 → Normal
threshold_t2: 60              # above T2 → Anomaly; between → Suspicious

# ── Runtime ───────────────────────────────────────────────────────────
seed: 42
use_gpu: true
num_workers: 2
log_level: INFO
output_dir: results
